<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Performance - System & ZRAM Monitor</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <h2>Turbo Performance - System & ZRAM Monitor ⚡</h2>

    <div class="grid">
        <div class="card">
            <h3>Memory</h3>
            <div class="data-row"><span>Used RAM:</span><span id="ram-usage">Reading...</span></div>
            <div class="progress-container"><div id="ram-progress" class="progress-bar"></div></div>
            <br>
            <div class="data-row"><span>Active ZRAM:</span><span id="zram-usage">Reading...</span></div>
            <div class="progress-container"><div id="zram-progress" class="progress-bar zram-color"></div></div>
            <br>
            <div class="data-row"><span>Current Swappiness:</span><span id="swap-val">--</span></div>
        </div>

        <div class="card">
            <h3>CPU & GPU</h3>
            <div class="data-row"><span>CPU Temperature:</span><span id="cpu-temp">Reading...</span></div>
            <div class="data-row"><span>Big Cores Frequency:</span><span id="cpu-freq">Reading...</span></div>
            <div class="data-row"><span>GPU Frequency:</span><span id="gpu-freq">Reading...</span></div>
        </div>

        <div class="card">
            <h3>Battery & Power</h3>
            <div class="data-row"><span>Battery Level:</span><span id="bat-level">--</span></div>
            <div class="data-row"><span>Battery Temp:</span><span id="bat-temp">--</span></div>
            <div class="data-row"><span>Current Draw:</span><span id="bat-current">--</span></div>
        </div>
    </div>

    <script src="assets/monitor.js"></script>
</body>
</html>
